name: Release

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Release type'
        required: false
        type: choice
        default: '(auto)'
        options:
          - '(auto)'
          - 'major'
          - 'minor'
          - 'patch'
          - 'prerelease'
      no_operation_mode:
        description: 'No operation mode'
        type: boolean
        default: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: github.ref_name == github.event.repository.default_branch
    concurrency:
      group: ${{ github.workflow }}-release-${{ github.ref_name }}
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Setup | Checkout Repository on Release Branch
        uses: actions/checkout@v5
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup | Force release branch to be at workflow sha
        run: |
          git reset --hard ${{ github.sha }}

      - name: Evaluate | Verify upstream has NOT changed
        run: .github/scripts/verify-upstream.sh

      - name: SSH | Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Fingerprint | Add github.com to known_hosts
        run: |
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Action | Semantic Version Release
        id: release
        uses: python-semantic-release/python-semantic-release@v10.4.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          no_operation_mode: ${{ inputs.no_operation_mode }}
          force: ${{ inputs.force == '(auto)' && '' || inputs.force }}
          push: false

      - name: Push | Push release commit and tag
        run: |
          git push --follow-tags

      - name: Publish | Upload to GitHub Release Assets
        uses: python-semantic-release/publish-action@v10.4.1
        if: ${{ !inputs.no_operation_mode && steps.release.outputs.released == 'true'}}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.release.outputs.tag }}

      - name: Upload | Distribution Artifacts
        uses: actions/upload-artifact@v4
        if: ${{ !inputs.no_operation_mode && steps.release.outputs.released == 'true'}}
        with:
          name: distribution-artifacts
          path: dist
          if-no-files-found: error

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: release
    if: ${{ !inputs.no_operation_mode && needs.release.outputs.released == 'true' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Setup | Download Build Artifacts
        uses: actions/download-artifact@v4
        id: artifact-download
        with:
          name: distribution-artifacts
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@v1
        with:
          verbose: true
          print-hash: true
          skip-existing: true
          repository-url: https://test.pypi.org/legacy/